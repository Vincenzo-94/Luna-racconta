<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Racconta Storie</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #396072;
    margin: 0;
    color: #333;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top:0;
    width:100%;
    height:60px;
    background:#fdf0e0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    z-index:1000;
}

.logo {
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img {
    width:40px;
    border-radius:50%;
}

.navbar a {
    margin-left:15px;
    text-decoration:none;
    color:#4a0f62;
}

/* HERO */
.hero {
    margin-top:60px;
    display:grid;
    grid-template-columns:1fr 1fr;
}

.hero-left {
    background:url('./img/LunaPIccola.png') center/cover no-repeat;
    min-height:400px;
}

.hero-right {
    background:#fdf0e0;
    padding:40px;
}

.cta-button {
    background:#7b1fa2;
    color:white;
    padding:12px 20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

/* FEATURES */
.features {
    display:flex;
    gap:20px;
    padding:40px;
}

.card {
    background:#fff;
    padding:20px;
    border-radius:10px;
    flex:1;
}

/* MODAL */
.modal {
    position:fixed;
    inset:0;
    display:none;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal.active {
    display:flex;
}

.modal-content {
    background:white;
    padding:20px;
    border-radius:10px;
    width:90%;
    max-width:500px;
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">
        <img src="./img/LunaPiccolissima.svg">
        <strong>Luna Racconta</strong>
    </div>
    <div>
        <a href="#features">Servizi</a>
        <a href="#" id="openModal">Contatti</a>
    </div>
</nav>

<section class="hero">
    <div class="hero-left"></div>
    <div class="hero-right">
        <h1>Favole personalizzate</h1>
        <p>Racconti unici su misura.</p>
        <button class="cta-button" id="openModal2">Richiedi</button>
    </div>
</section>

<section class="features" id="features">
    <div class="card">
        <h3>Base</h3>
        <p>Favola + audio</p>
        <button onclick="selectPackage('Base')">Scegli</button>
    </div>
    <div class="card">
        <h3>Medio</h3>
        <p>Favola + video</p>
        <button onclick="selectPackage('Medio')">Scegli</button>
    </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <button onclick="closeModal()">X</button>

        <h3>Contattami</h3>

        <form id="form">
            <input type="text" id="name" placeholder="Nome" required><br><br>
            <input type="email" id="email" placeholder="Email" required><br><br>
            <textarea id="message" placeholder="Messaggio"></textarea><br><br>

            <input type="hidden" id="pacchetto">

            <button type="submit">Invia</button>
        </form>
    </div>
</div>

<script>
// EMAILJS CONFIG
emailjs.init("F2qU7FfHmvS-C5C7J");

// MODAL
const modal = document.getElementById("modal");

document.getElementById("openModal").onclick = () => modal.classList.add("active");
document.getElementById("openModal2").onclick = () => modal.classList.add("active");

function closeModal(){
    modal.classList.remove("active");
}

// SELECT PACKAGE
function selectPackage(pkg){
    document.getElementById("pacchetto").value = pkg;
    modal.classList.add("active");
}

// FORM
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    const params = {
        from_name: document.getElementById("name").value,
        reply_to: document.getElementById("email").value,
        message: document.getElementById("message").value,
        pacchetto: document.getElementById("pacchetto").value
    };

    emailjs.send("service_7guefxe", "template_jq9br66", params)
    .then(() => {
        alert("Messaggio inviato!");
        closeModal();
    })
    .catch(() => {
        alert("Errore invio");
    });
});
</script>

</body>
</html>
